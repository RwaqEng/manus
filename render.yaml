services:
  - type: web
    name: rivaq-task-management
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        value: rivaq-secret-key-2024-very-secure-production
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///rivaq.db

