
<!-- users.html -->
<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">تعديل المستخدم</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
    </div>
    <div class="modal-body">
        <form method="post" id="editUserForm">
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label for="editName">الاسم</label>
                <input type="text" class="form-control" id="editName" required>
            </div>
            <div class="form-group">
                <label for="editEmail">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="editEmail" required>
            </div>
            <div class="form-group">
                <label for="editDepartment">القسم</label>
                <select class="form-control" id="editDepartment" required>
                    <option value="الإدارة العليا">الإدارة العليا</option>
                    <option value="قسم التسويق">قسم التسويق</option>
                    <option value="القسم الفني">القسم الفني</option>
                    <option value="قسم المساحة">قسم المساحة</option>
                    <option value="إدارة المشاريع">إدارة المشاريع</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editPosition">المنصب</label>
                <input type="text" class="form-control" id="editPosition" required>
            </div>
            <div class="form-group">
                <label for="editJoinDate">تاريخ الانضمام</label>
                <input type="date" class="form-control" id="editJoinDate" required>
            </div>
            <div class="form-group">
                <label for="editManager">المدير المباشر</label>
                <select class="form-control" id="editManager">
                    <option value="">لا يوجد مدير مباشر</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editPassword">كلمة المرور</label>
                <input type="password" class="form-control" id="editPassword">
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">تحديث المستخدم</button>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">إلغاء</button>
            </div>
        </form>
    </div>
</div>
