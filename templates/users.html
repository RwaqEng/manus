
<!-- users.html - تصميم محفوظ بدون تغيير -->

<tr>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.department }}</td>
    <td>{{ user.position }}</td>
    <td>{{ user.join_date }}</td>
    <td>
        {% if user.direct_manager %}
            {{ user.direct_manager.name }}
        {% else %}
            لا يوجد مدير مباشر
        {% endif %}
    </td>
    <td>
        <button class="btn btn-sm btn-primary edit-user" data-id="{{ user.id }}">تعديل</button>
        <button class="btn btn-sm btn-danger delete-user" data-id="{{ user.id }}">حذف</button>
    </td>
</tr>
