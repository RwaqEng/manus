
<!-- users.html -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إدارة المستخدمين</title>
</head>
<body>
    <h1>إدارة المستخدمين</h1>
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>البريد الإلكتروني</th>
                <th>القسم</th>
                <th>المدير المباشر</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.department }}</td>
                <td>
                    {% if user.manager %}
                        {{ user.manager.name }}
                    {% else %}
                        غير محدد
                    {% endif %}
                </td>
                <td>
                    <button onclick="editUser({{ user.id }})">تعديل</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Modal -->
    <div id="editUserModal" style="display:none;">
        <form action="/update_user" method="POST">
            <input type="hidden" name="id" id="edit-id">
            <label>الاسم:</label>
            <input type="text" name="name" id="edit-name"><br>
            <label>البريد الإلكتروني:</label>
            <input type="email" name="email" id="edit-email"><br>
            <label>القسم:</label>
            <input type="text" name="department" id="edit-department"><br>
            <label>المدير المباشر:</label>
            <select name="manager_id" id="edit-manager">
                <option value="">لا يوجد مدير مباشر</option>
                {% for manager in managers %}
                    <option value="{{ manager.id }}">{{ manager.name }}</option>
                {% endfor %}
            </select><br>
            <label>تاريخ الانضمام:</label>
            <input type="date" name="joining_date" id="edit-joining-date"><br>
            <label>كلمة المرور:</label>
            <input type="password" name="password" id="edit-password"><br>
            <button type="submit">تحديث المستخدم</button>
        </form>
    </div>
</body>
</html>
